<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <title>my-closet</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0a0a0a;
        color: #f3f3f3;
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue",
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
        gap: 12px;
      }
      .spinner {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      h1 {
        font-size: 18px;
        margin: 0;
        font-weight: 600;
      }
      p {
        font-size: 13px;
        margin: 0;
        color: #aaa;
        line-height: 1.5;
      }
      code {
        font-size: 12px;
        background: #1b1b1b;
        padding: 2px 6px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="spinner"></div>
      <h1>my-closet</h1>
      <p>
        서버에 연결하는 중입니다.<br />
        연결이 계속 되지 않는다면 <code>capacitor.config.ts</code>의
        <code>server.url</code>을 확인하세요.
      </p>
    </div>
  </body>
</html>
